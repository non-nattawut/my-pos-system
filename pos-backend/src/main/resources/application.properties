spring.application.name=pos-backend
server.port=8080
server.servlet.context-path=/api

# SQLite Connection Configuration
spring.datasource.url=jdbc:sqlite:pos.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA/Hibernate Configuration for SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration (Using a secure 256-bit secret key)
jwt.secret=9a4f2c8d3e7b1a5c6d8e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c
jwt.expiration-ms=86400000

# POS Pricing Configuration
# Tax rate as a decimal (e.g., 0.07 = 7%)
pos.tax-rate=0.07
# Service charge rate as a decimal (e.g., 0.10 = 10%)
pos.service-charge-rate=0.10


